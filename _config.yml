<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGG Supplier Comparison Matrix | Sandler Partners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sticky-col { position: sticky; left: 0; z-index: 10; }
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #004a99; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // SVG Icon Library to avoid DOM manipulation conflicts
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                'check-circle': (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                ),
                'circle': (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                ),
                'x-circle': (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                ),
                'layout': (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="3" y1="9" x2="21" y2="9" />
                        <line x1="9" y1="21" x2="9" y2="9" />
                    </svg>
                ),
                'phone': (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                    </svg>
                ),
                'headphones': (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
                    </svg>
                ),
                'shield': (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                )
            };
            return icons[name] || null;
        };

        const matrixData = [
            { name: "Broadvoice:", type: "Both", ucaasCore: "✔", ccaasDepth: "◐", mobileUC: "✔", mobileCC: "✖", routing: "◐", reporting: "◐", servicenow: "API", callingModel: "Bundled UC", pooled: "Per user", inbound: "✔ Unlimited", outbound: "~3,000–5,000 min/user/month", overage: "$0.01–$0.03/min", international: "Extra", model: "Per-minute", support: "Standard", whiteGlove: "◐", adminSupport: "✔", mgmt: "◐" },
            { name: "Zoom:", type: "Both", ucaasCore: "✔✔", ccaasDepth: "◐", mobileUC: "✔✔", mobileCC: "◐", routing: "✔", reporting: "✔✔", servicenow: "✔ / API", callingModel: "Bundled / Metered", pooled: "Both", inbound: "✔ Unlimited", outbound: "~3,000–5,000 min/user/month", overage: "$0.01–$0.02/min", international: "Extra", model: "Metered", support: "Standard", whiteGlove: "✖", adminSupport: "◐", mgmt: "✖" },
            { name: "RingCentral:", type: "Both", ucaasCore: "✔✔", ccaasDepth: "✔✔", mobileUC: "✔✔", mobileCC: "✔", routing: "✔✔", reporting: "✔✔", servicenow: "✔✔", callingModel: "Bundled", pooled: "Per user", inbound: "✔ Unlimited", outbound: "3,000–5,000 min/user/month", overage: "$0.02–$0.04/min", international: "Extra", model: "Metered", support: "Premium avail.", whiteGlove: "◐", adminSupport: "✔", mgmt: "◐" },
            { name: "8x8:", type: "Both", ucaasCore: "✔", ccaasDepth: "✔", mobileUC: "✔", mobileCC: "✔", routing: "✔", reporting: "✔", servicenow: "✔", callingModel: "Bundled", pooled: "Per user", inbound: "✔ Unlimited", outbound: "4,000+ min/user/month", overage: "$0.01–$0.03/min", international: "Included (select)", model: "Metered", support: "Global Support", whiteGlove: "✔", adminSupport: "✔", mgmt: "✔" },
            { name: "GoTo:", type: "Both", ucaasCore: "✔", ccaasDepth: "✖", mobileUC: "✔", mobileCC: "✖", routing: "◐", reporting: "◐", servicenow: "API", callingModel: "Bundled / Flexible", pooled: "Both", inbound: "✔ Unlimited", outbound: "2,500–4,000 min/user/month", overage: "$0.02–$0.04/min", international: "Extra", model: "Metered", support: "Strong enterprise", whiteGlove: "✔", adminSupport: "✔", mgmt: "✔" },
            { name: "Dialpad:", type: "Both", ucaasCore: "✔✔", ccaasDepth: "◐", mobileUC: "✔✔", mobileCC: "◐", routing: "✔", reporting: "✔✔ (AI-heavy)", servicenow: "API", callingModel: "Bundled", pooled: "Per user", inbound: "✔ Unlimited", outbound: "3,000–5,000 min/user/month", overage: "$0.02–$0.03/min", international: "Extra", model: "Metered", support: "Standard", whiteGlove: "◐", adminSupport: "✔", mgmt: "◐" },
            { name: "Ultatel:", type: "Both", ucaasCore: "✔", ccaasDepth: "✖", mobileUC: "✔", mobileCC: "✖", routing: "◐", reporting: "◐", servicenow: "API", callingModel: "Bundled", pooled: "Per user", inbound: "✔ Unlimited", outbound: "2,500–4,000 min/user/month", overage: "$0.02–$0.05/min", international: "Extra", model: "Metered", support: "Basic", whiteGlove: "◐", adminSupport: "✔", mgmt: "◐" },
            { name: "Zultys:", type: "Both", ucaasCore: "✔", ccaasDepth: "◐", mobileUC: "✔", mobileCC: "✖", routing: "✔", reporting: "◐", servicenow: "API", callingModel: "Bundled", pooled: "Per user", inbound: "✔ Unlimited", outbound: "2,500–4,000 min/user/month", overage: "$0.02–$0.04/min", international: "Extra", model: "Metered", support: "Strong white glove", whiteGlove: "✔✔", adminSupport: "✔✔", mgmt: "✔✔" },
            { name: "NICE:", type: "CCaaS", ucaasCore: "✖", ccaasDepth: "✔✔✔", mobileUC: "✔ (agent support)", mobileCC: "✔✔", routing: "✔✔✔", reporting: "✔✔✔", servicenow: "✔✔", callingModel: "Usage / Bundled CC", pooled: "Both", inbound: "Metered / Incl.", outbound: "Metered / Incl.", overage: "N/A", international: "Extra", model: "N/A", support: "Premium/Partner", whiteGlove: "✔", adminSupport: "✔✔", mgmt: "◐" }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('features');

            const renderSymbol = (val) => {
                if (val.includes('✔')) {
                    const count = val.split('✔').length - 1;
                    return (
                        <div className="flex justify-center items-center gap-1 text-green-600">
                            <Icon name="check-circle" className="w-4 h-4" />
                            {count > 1 && <span className="text-[10px] font-bold opacity-60">x{count}</span>}
                        </div>
                    );
                }
                if (val === "◐") return <Icon name="circle" className="w-4 h-4 mx-auto text-blue-400 fill-blue-400 opacity-40" />;
                if (val === "✖") return <Icon name="x-circle" className="w-4 h-4 mx-auto text-red-300" />;
                return <span className="text-sm font-medium">{val}</span>;
            };

            const TabButton = ({ id, label, icon }) => (
                <button 
                    onClick={() => setActiveTab(id)} 
                    className={`flex items-center gap-2 px-6 py-4 border-b-4 transition-all ${
                        activeTab === id 
                        ? 'border-[#004a99] text-[#004a99] bg-blue-50 font-bold' 
                        : 'border-transparent text-gray-500 hover:text-[#004a99] hover:bg-gray-50'
                    }`}
                >
                    <Icon name={icon} className="w-5 h-5" />
                    {label}
                </button>
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-[#004a99] text-white py-8 px-6 shadow-lg">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-3 rounded-lg shadow-inner text-[#004a99] font-black text-2xl flex items-center justify-center w-12 h-12">S</div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight uppercase leading-none">Sandler Partners</h1>
                                    <p className="text-blue-100 font-medium tracking-widest text-[10px] mt-1">TECHNOLOGY ADVISORY SERVICES</p>
                                </div>
                            </div>
                            <div className="text-center md:text-right">
                                <h2 className="text-xl font-bold">HGG Supplier Comparison Matrix</h2>
                                <p className="text-blue-200 text-sm">Strategic Solution Analysis • 04.22.2026</p>
                            </div>
                        </div>
                    </header>

                    <nav className="bg-white shadow-md sticky top-0 z-20 overflow-x-auto no-scrollbar">
                        <div className="max-w-7xl mx-auto flex whitespace-nowrap">
                            <TabButton id="features" label="Core Features" icon="layout" />
                            <TabButton id="commercial" label="Commercial Model" icon="phone" />
                            <TabButton id="support" label="Support & Deployment" icon="headphones" />
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto mt-8 px-4">
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 mb-8 flex items-start gap-4">
                            <div className="p-2 bg-blue-100 rounded-full text-[#004a99] shrink-0">
                                <Icon name="shield" className="w-6 h-6" />
                            </div>
                            <div>
                                <h3 className="text-xl font-bold text-gray-800">Executive Summary</h3>
                                <p className="text-gray-600 leading-relaxed mt-1">
                                    Comprehensive analysis of leading UCaaS and CCaaS providers. 
                                    This matrix provides a detailed feature and commercial model comparison based on current market data.
                                </p>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 border-b-2 border-gray-200 text-[10px] font-black uppercase text-gray-500 tracking-wider">
                                            <th className="p-5 sticky left-0 bg-gray-100 z-10 min-w-[160px]">Supplier</th>
                                            {activeTab === 'features' ? (
                                                <>
                                                    <th className="p-4">Type</th>
                                                    <th className="p-4 text-center">UCaaS Core</th>
                                                    <th className="p-4 text-center">CCaaS Depth</th>
                                                    <th className="p-4 text-center">Mobile UC</th>
                                                    <th className="p-4 text-center">Mobile CC</th>
                                                    <th className="p-4 text-center">Routing</th>
                                                    <th className="p-4 text-center">Reporting</th>
                                                    <th className="p-4">Integration</th>
                                                </>
                                            ) : activeTab === 'commercial' ? (
                                                <>
                                                    <th className="p-4">Calling Model</th>
                                                    <th className="p-4">Pooled/Per</th>
                                                    <th className="p-4">Inbound</th>
                                                    <th className="p-4">Outbound (+Overage)</th>
                                                    <th className="p-4">International</th>
                                                    <th className="p-4">Overage Model</th>
                                                </>
                                            ) : (
                                                <>
                                                    <th className="p-4">Support Model</th>
                                                    <th className="p-4 text-center">White Glove</th>
                                                    <th className="p-4 text-center">Admin Support</th>
                                                    <th className="p-4 text-center">Ongoing Mgmt</th>
                                                </>
                                            )}
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {matrixData.map((row, idx) => (
                                            <tr key={idx} className={`border-b border-gray-100 hover:bg-blue-50/30 ${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'}`}>
                                                <td className="p-5 sticky-col font-bold text-[#004a99] border-r border-gray-100 bg-inherit shadow-[2px_0_5px_rgba(0,0,0,0.02)]">
                                                    {row.name.replace(':', '')}
                                                </td>
                                                {activeTab === 'features' ? (
                                                    <>
                                                        <td className="p-4">{row.type}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.ucaasCore)}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.ccaasDepth)}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.mobileUC)}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.mobileCC)}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.routing)}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.reporting)}</td>
                                                        <td className="p-4 bg-gray-50/40 text-[11px] px-3 font-medium">{row.servicenow}</td>
                                                    </>
                                                ) : activeTab === 'commercial' ? (
                                                    <>
                                                        <td className="p-4 text-[13px]">{row.callingModel}</td>
                                                        <td className="p-4 text-[13px]">{row.pooled}</td>
                                                        <td className="p-4 text-[13px] text-green-700 font-semibold">{row.inbound}</td>
                                                        <td className="p-4 text-[12px] italic text-gray-500">
                                                            {row.outbound} <br/>
                                                            <span className="text-[10px] not-italic font-bold text-blue-900">{row.overage}</span>
                                                        </td>
                                                        <td className="p-4 text-[13px]">{row.international}</td>
                                                        <td className="p-4 text-[13px] font-medium">{row.model}</td>
                                                    </>
                                                ) : (
                                                    <>
                                                        <td className="p-4 text-[13px]">{row.support}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.whiteGlove)}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.adminSupport)}</td>
                                                        <td className="p-4 text-center">{renderSymbol(row.mgmt)}</td>
                                                    </>
                                                )}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Legend */}
                        <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-4 text-xs text-gray-500 bg-white p-6 rounded-xl border border-gray-200">
                            <div className="flex items-center gap-2">
                                <div className="text-green-600"><Icon name="check-circle" className="w-4 h-4" /></div>
                                <span>Full Capability</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="text-blue-400 opacity-60"><Icon name="circle" className="w-4 h-4 fill-blue-400" /></div>
                                <span>Partial / Add-on</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="text-red-300"><Icon name="x-circle" className="w-4 h-4" /></div>
                                <span>No Native Support</span>
                            </div>
                            <div className="flex items-center gap-2 italic text-[#004a99] font-semibold">
                                <span>* Market data as of April 2026</span>
                            </div>
                        </div>
                    </main>

                    <footer className="mt-20 border-t pt-10 pb-20 px-6 text-center">
                        <div className="max-w-7xl mx-auto flex flex-col items-center gap-4">
                            <div className="flex gap-2">
                                <div className="h-8 w-8 rounded bg-[#004a99] flex items-center justify-center text-white font-black text-sm">S</div>
                                <div className="flex flex-col text-left">
                                    <span className="text-[10px] font-bold text-gray-600 tracking-widest uppercase">Sandler Partners</span>
                                    <span className="text-[9px] text-gray-400 uppercase">Strategic Technology Advisory</span>
                                </div>
                            </div>
                            <div className="text-gray-400 text-[10px]">
                                <p className="font-bold text-[#004a99] mb-1 uppercase tracking-widest">Brand Guidelines Compliant Asset</p>
                                <p>© 2026 Sandler Partners. All Rights Reserved. Internal and Client Facing Proprietary Document.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
